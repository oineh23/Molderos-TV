<!-- HERO SECTION -->
<section class="hero" style="

display:flex;
align-items:center;
padding:0 8%;
overflow:hidden;
">

<!-- Dark Overlay -->
<div style="
position:absolute;
inset:0;
background:
linear-gradient(to right,
rgba(0,0,0,.95) 20%,
rgba(0,0,0,.55) 60%,
rgba(0,0,0,.2) 100%);
"></div>

<div style="
position:relative;
z-index:5;
max-width:650px;
color:white;
">

<span style="
background:#e50914;
padding:8px 16px;
border-radius:30px;
font-size:14px;
font-weight:bold;
display:inline-block;
margin-bottom:20px;
">
🔥 NOW STREAMING
</span>

<h1 style="
font-size:4rem;
font-weight:900;
margin-bottom:15px;
line-height:1.1;
">
Transformers
</h1>

<div style="
margin-bottom:20px;
font-size:18px;
color:#ffd700;
">
⭐⭐⭐⭐⭐ 8.9/10
&nbsp;&nbsp;
Action • Adventure • Sci-Fi
</div>

<p style="
font-size:20px;
line-height:1.7;
color:#ddd;
margin-bottom:35px;
">

their greatest enemy in an explosive war that spans Earth and space.
</p>

<div style="display:flex;gap:15px;flex-wrap:wrap;">

<button style="
background:#e50914;
color:white;
border:none;
padding:15px 40px;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
">
▶ Watch Now
</button>

<button style="
